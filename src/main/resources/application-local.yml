server:
  port: 8083

spring:
  application:
    name: bytebank-transactions
  cloud:
    discovery:
      enabled: true
    openfeign:
      httpclient:
        hc5:
          enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5433/transactions_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:supino2604}

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: bytebank
    password: bytebank123
    listener:
      simple:
        auto-startup: false

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
      register-with-eureka: true
      fetch-registry: true
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      account-service:
        sliding-window-size: 10  # avalia as últimas 10 chamadas
        minimum-number-of-calls: 5
        failure-rate-threshold: 50        # abre o circuito se 50% falharem
        wait-duration-in-open-state: 30s  # fica bloqueado por 30s
        permitted-number-of-calls-in-half-open-state: 3
management:
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans